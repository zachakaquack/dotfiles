# ~/.tmux.conf

set -s set-clipboard on
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+Space (more ergonomic)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
# bind | split-window -h -c "#{pane_current_path}"
# bind - split-window -v -c "#{pane_current_path}"
# bind c new-window -c "#{pane_current_path}"

bind L split-window -h -c "#{pane_current_path}"
bind J split-window -v -c "#{pane_current_path}"

unbind t
bind t new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' \
    --bind 'tab:down,btab:up' \
    --preview-window 'right:65%' \
    --preview 'sesh preview {}'
)\""

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=black fg=black'

# Status bar content
set -g status-left ''
set -g status-right '#[fg=red,bold] #S '

# Window status
setw -g window-status-format '#[fg=blue,bold]#I:#W '
setw -g window-status-current-format '#[fg=red,bold]#I:#W '

# Pane border colors
set -g pane-border-style 'fg=blue'
set -g pane-active-border-style 'fg=red'

# Message styling
set -g message-style 'bg=black fg=red bold'

# ============================================
# COPY MODE
# ============================================

# # Use vi keys
# setw -g mode-keys vi
#
# # Vi-style copy bindings
# bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
